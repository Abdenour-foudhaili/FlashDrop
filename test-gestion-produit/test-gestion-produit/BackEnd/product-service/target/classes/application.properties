server.port=8082

spring.application.name=PRODUCT-SERVICE

spring.datasource.url=jdbc:mysql://localhost:3306/product_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.sql.init.mode=always

# Config Server
spring.cloud.config.enabled=false

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

management.endpoints.web.exposure.include=health,info

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

app.rabbitmq.exchange=${PRODUCT_EVENTS_EXCHANGE:product.exchange}
app.rabbitmq.queue=${PRODUCT_EVENTS_QUEUE:product.queue}
app.rabbitmq.routing-key=${PRODUCT_EVENTS_ROUTING_KEY:product.events}

app.rabbitmq.stock.exchange=${STOCK_EVENTS_EXCHANGE:stock.exchange}
app.rabbitmq.stock.request-queue=${STOCK_REQUEST_QUEUE:stock.check.request.queue}
app.rabbitmq.stock.response-queue=${STOCK_RESPONSE_QUEUE:stock.check.response.queue}
app.rabbitmq.stock.request-routing-key=${STOCK_REQUEST_ROUTING_KEY:stock.check.request}
app.rabbitmq.stock.response-routing-key=${STOCK_RESPONSE_ROUTING_KEY:stock.check.response}

app.stock-simulation.enabled=${APP_STOCK_SIMULATION_ENABLED:false}
