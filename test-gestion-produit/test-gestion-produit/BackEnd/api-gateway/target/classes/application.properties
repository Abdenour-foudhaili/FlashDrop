server.port=8081

spring.application.name=API-GATEWAY

spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=http://localhost:8082
spring.cloud.gateway.routes[0].predicates[0]=Path=/products,/products/**

# Eureka Client Configuration (désactivé temporairement)
# eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

management.endpoint.gateway.enabled=true
management.endpoints.web.exposure.include=health,info,gateway

# Keycloak / OAuth2 Resource Server (Gateway validates incoming JWT)
# Example:
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/flashdrop
# spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/flashdrop}

# CORS (dev): allow Angular dev server to call gateway
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://127.0.0.1:4300,http://localhost:4300
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
